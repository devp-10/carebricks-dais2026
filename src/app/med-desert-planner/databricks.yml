bundle:
  name: med-desert-planner

variables:
  sql_warehouse_id:
    description: SQL Warehouse ID

resources:
  apps:
    app:
      name: "med-desert-planner"
      description: "Medical Desert Planner"
      source_code_path: ./
      user_api_scopes:
        - sql

      # The resources which this app has access to.
      resources:
        - name: sql-warehouse
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE

targets:
  default:
    default: true
    workspace:
      host: https://dbc-4867de6d-7479.cloud.databricks.com

    variables:
      sql_warehouse_id: 76ed2f6ff2ff98a7
