bundle:
  name: medical-desert-planner

include:
  - resources/*.yml

variables:
  catalog:
    default: medical_desert_planner
  source_schema:
    default: databricks_virtue_foundation_dataset_dais_2026.virtue_foundation_dataset
  population_schema:
    default: medical_desert_gold.external_data
  genie_space_id:
    description: Genie Space ID
  genie_space_name:
    description: Genie Space name

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: dbx-codex-auth
    variables:
      catalog: medical_desert_planner
      genie_space_id: 01f168ff81bf1b79912940d2dade2312
      genie_space_name: Healthcare Facility Insights
